# ============================================
# Docker Compose - Desarrollo Local
# ============================================
# Uso: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================

version: '3.8'

services:
  # ==========================================
  # Backend con hot-reload
  # ==========================================
  backend:
    build:
      context: ./monitor_system
      dockerfile: Dockerfile
      target: production
    environment:
      - NODE_ENV=development
    volumes:
      # Montar codigo fuente para desarrollo
      - ./monitor_system:/app
      - /app/node_modules
    command: ["node", "--watch", "server.js"]

  # ==========================================
  # Frontend con modo desarrollo
  # ==========================================
  frontend:
    build:
      context: ./entel_frontend
      dockerfile: Dockerfile
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      # Montar codigo fuente para desarrollo
      - ./entel_frontend:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules

  # ==========================================
  # phpMyAdmin para gestionar MySQL
  # ==========================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: entel-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${DB_PASSWORD:-Entel2024SecurePass}
    ports:
      - "8080:80"
    networks:
      - entel-network

  # ==========================================
  # MailHog para pruebas de email
  # ==========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: entel-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - entel-network
