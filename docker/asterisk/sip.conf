; ============================================
; SIP Configuration
; Sistema de Monitoreo VoIP
; ============================================

[general]
context = default
allowoverlap = no
udpbindaddr = 0.0.0.0
tcpenable = yes
tcpbindaddr = 0.0.0.0
transport = udp
srvlookup = yes
disallow = all
allow = ulaw
allow = alaw
allow = g729
directmedia = no
nat = force_rport,comedia
qualify = no

; Dynamic peers generated by backend
#include sip.monitoreo.conf
