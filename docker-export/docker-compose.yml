# ============================================
# Docker Compose - Sistema de Monitoreo VoIP
# ============================================
# Despliegue offline (usa image: en vez de build:)
#
# Uso:
#   Iniciar:         docker compose up -d
#   Detener:         docker compose down
#   Logs:            docker compose logs -f
#   Ver estado:      docker compose ps
#   Reiniciar todo:  docker compose restart
# ============================================

services:
  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: entel-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Avn0c$$V1rtu4l%..}
      MYSQL_DATABASE: ${DB_NAME:-db_entel}
      MYSQL_USER: ${DB_USER:-entel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Avn0c$$V1rtu4l%..}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - entel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-Avn0c$$V1rtu4l%..}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # Asterisk 16 PBX
  # ==========================================
  asterisk:
    image: asistentevirtual-asterisk:latest
    container_name: entel-asterisk
    restart: unless-stopped
    ports:
      - "${ASTERISK_SIP_PORT:-5060}:5060/udp"
      - "${ASTERISK_SIP_PORT:-5060}:5060/tcp"
      - "${ASTERISK_AMI_PORT:-5038}:5038"
    volumes:
      - asterisk-config:/etc/asterisk
    networks:
      - entel-network
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # Backend API - Node.js
  # ==========================================
  backend:
    image: asistentevirtual-backend:latest
    container_name: entel-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      asterisk:
        condition: service_healthy
    environment:
      # Base de datos MySQL
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-entel_user}
      - DB_PASSWORD=${DB_PASSWORD:-Avn0c$$V1rtu4l%..}
      - DB_NAME=${DB_NAME:-db_entel}
      - DB_PORT=3306
      - DB_DIALECT=mysql
      # Asterisk AMI
      - ASTERISK_ENV=${ASTERISK_ENV:-production}
      - ASTERISK_HOST=${ASTERISK_HOST:-asterisk}
      - ASTERISK_PORT=${ASTERISK_PORT:-5038}
      - ASTERISK_USER=${ASTERISK_USER:-admin}
      - ASTERISK_PASSWORD=${ASTERISK_PASSWORD:-admin}
      # LDAP
      - LDAP_HOST=${LDAP_HOST:-}
      - LDAP_BASE_USER=${LDAP_BASE_USER:-}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-}
      # SMTP
      - SMPT_HOST=${SMTP_HOST:-}
      - SMPT_PORT=${SMTP_PORT:-25}
      - SMPT_USER=${SMTP_USER:-}
      # FTP
      - FTP_HOST=${FTP_HOST:-}
      - FTP_PORT=${FTP_PORT:-22}
      - FTP_USER=${FTP_USER:-}
      - FTP_PASSWORD=${FTP_PASSWORD:-}
      # Perfil por defecto
      - DEFAULT_PERFIL=${DEFAULT_PERFIL:-5}
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
      - asterisk-config:/etc/asterisk
    ports:
      - "${BACKEND_PORT:-8082}:8082"
    networks:
      - entel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Frontend - Laravel/PHP
  # ==========================================
  frontend:
    image: asistentevirtual-frontend:latest
    container_name: entel-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      - APP_NAME=${APP_NAME:-Sistema de Monitoreo VoIP}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost}
      # APP_KEY se genera automáticamente en el contenedor
      # API Backend (usa nombre del servicio Docker)
      - API_URL=http://backend:8082/api/
      # Base de datos
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_NAME:-db_entel}
      - DB_USERNAME=${DB_USER:-entel_user}
      - DB_PASSWORD=${DB_PASSWORD:-Avn0c$$V1rtu4l%..}
      # Cache y sesiones
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=120
      - QUEUE_CONNECTION=sync
      - LOG_CHANNEL=stderr
      # Migraciones
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-false}
    volumes:
      - frontend-storage:/var/www/html/storage
      - frontend-cache:/var/www/html/bootstrap/cache
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - entel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ==========================================
# Volumenes persistentes
# ==========================================
volumes:
  mysql-data:
    driver: local
  asterisk-config:
    driver: local
  backend-data:
    driver: local
  backend-logs:
    driver: local
  frontend-storage:
    driver: local
  frontend-cache:
    driver: local

# ==========================================
# Red interna
# ==========================================
networks:
  entel-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
